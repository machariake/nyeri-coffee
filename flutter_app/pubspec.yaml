name: cncms_mobile
version: 1.0.0+1
publish_to: none
description: Coffee Nursery Certificate Management System - Mobile App

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # Networking
  dio: ^5.4.0
  http: ^1.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  
  # Forms & Validation
  formz: ^0.6.1
  
  # File Handling
  file_picker: ^10.0.0
  image_picker: ^1.0.5
  open_filex: ^4.3.4
  path_provider: ^2.1.1
  
  # PDF
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5

  # Sharing
  share_plus: ^7.1.0
  url_launcher: ^6.1.14
  flutter_pdfview: ^1.3.2

  # Supabase (Replaces Firebase)
  supabase_flutter: ^2.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Connectivity & Offline
  connectivity_plus: ^5.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.18.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.0.2+1
  local_auth: ^3.0.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
